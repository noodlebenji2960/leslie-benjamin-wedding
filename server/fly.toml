app = "leslie-benjamin-wedding-api"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"

# Only ever run a single machine. SSE connections and broadcast state
# (server/src/sseManager.ts) live in-memory per-process — a second
# machine would silently miss events broadcast on the other one
# (uploads, reactions, deletes never reaching some connected clients).
# If `fly deploy` ever creates a second machine again, run
# `fly scale count 1` to bring it back down to one.
[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
